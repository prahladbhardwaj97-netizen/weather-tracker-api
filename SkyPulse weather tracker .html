<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyPulse - Advanced Weather Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1a1f2e;
            --bg-card-hover: #242b3d;
            --accent-cyan: #00f0ff;
            --accent-purple: #a855f7;
            --accent-pink: #ec4899;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #2d3748;
            --glow-cyan: 0 0 20px rgba(0, 240, 255, 0.3);
            --glow-purple: 0 0 20px rgba(168, 85, 247, 0.3);
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 240, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(168, 85, 247, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(236, 72, 153, 0.05) 0%, transparent 50%);
            animation: bgPulse 15s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, 2%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-1deg); }
        }

        /* Grid Pattern Overlay */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            text-align: center;
            padding: 30px 0;
            position: relative;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            animation: logoGlow 3s ease-in-out infinite;
        }

        @keyframes logoGlow {
            0%, 100% { box-shadow: var(--glow-cyan); }
            50% { box-shadow: var(--glow-purple); }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            letter-spacing: 2px;
            font-family: 'Share Tech Mono', monospace;
        }

        /* Main Layout */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 24px;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Cards */
        .card {
            background: linear-gradient(145deg, var(--bg-card), var(--bg-secondary));
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple), var(--accent-pink));
            opacity: 0.8;
        }

        .card-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--accent-cyan);
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .card-title::before {
            content: '◆';
            font-size: 0.6rem;
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Search Section */
        .search-container {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 16px 24px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'Rajdhani', sans-serif;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: var(--glow-cyan);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .btn {
            padding: 16px 28px;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Rajdhani', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-cyan), #0891b2);
            color: var(--bg-primary);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--glow-cyan);
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--accent-purple), #7c3aed);
            color: white;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: var(--glow-purple);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Location Button */
        .location-btn {
            width: 100%;
            justify-content: center;
            margin-bottom: 20px;
        }

        /* Weather Display */
        .weather-display {
            min-height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .weather-content {
            width: 100%;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .city-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .city-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
        }

        .location-badge {
            background: var(--accent-cyan);
            color: var(--bg-primary);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .country {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 20px;
            font-family: 'Share Tech Mono', monospace;
        }

        .temperature-container {
            position: relative;
            display: inline-block;
            margin-bottom: 8px;
        }

        .temperature {
            font-family: 'Orbitron', sans-serif;
            font-size: 5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        .temperature-unit {
            position: absolute;
            top: 10px;
            right: -30px;
            font-size: 1.5rem;
            color: var(--accent-cyan);
        }

        .weather-condition {
            font-size: 1.4rem;
            color: var(--accent-pink);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .weather-icon {
            font-size: 2rem;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid var(--border);
        }

        .detail-card {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .detail-card:hover {
            border-color: var(--accent-cyan);
            transform: translateY(-4px);
        }

        .detail-icon {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .detail-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .detail-value {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--accent-cyan);
        }

        /* Loading */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .spinner {
            width: 70px;
            height: 70px;
            border: 3px solid var(--border);
            border-top-color: var(--accent-cyan);
            border-right-color: var(--accent-purple);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--accent-cyan);
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 2px;
        }

        /* Error */
        .error-container {
            text-align: center;
            padding: 30px;
        }

        .error-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .error-message {
            color: var(--error);
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .error-hint {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            opacity: 0.5;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* History Section */
        .history-section {
            margin-top: 24px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .clear-btn {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--error);
            border-radius: 8px;
            color: var(--error);
            font-size: 0.8rem;
            font-family: 'Rajdhani', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .clear-btn:hover {
            background: var(--error);
            color: white;
        }

        .history-list {
            max-height: 220px;
            overflow-y: auto;
        }

        .history-item {
            padding: 14px 16px;
            border-radius: 10px;
            background: var(--bg-primary);
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
        }

        .history-item:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-cyan);
            transform: translateX(4px);
        }

        .history-city {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .history-city::before {
            content: '▶';
            font-size: 0.6rem;
            color: var(--accent-cyan);
        }

        .history-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: 'Share Tech Mono', monospace;
        }

        /* Execution Log Panel */
        .log-panel {
            background: linear-gradient(180deg, #0d1117, #161b22);
            border-radius: 16px;
            padding: 16px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            max-height: 450px;
            overflow-y: auto;
            border: 1px solid var(--border);
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .log-title {
            color: var(--accent-cyan);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .log-title::before {
            content: '◉';
            animation: blink 1s ease-in-out infinite;
        }

        .log-clear-btn {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-muted);
            font-size: 0.7rem;
            font-family: 'Share Tech Mono', monospace;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .log-clear-btn:hover {
            border-color: var(--accent-purple);
            color: var(--accent-purple);
        }

        .log-entry {
            padding: 8px 0;
            border-bottom: 1px solid rgba(45, 55, 72, 0.5);
            display: flex;
            gap: 12px;
            font-size: 0.75rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .log-time {
            color: var(--text-muted);
            min-width: 65px;
        }

        .log-type {
            min-width: 75px;
            font-weight: 500;
            font-size: 0.7rem;
        }

        .log-type.sync { color: var(--text-primary); }
        .log-type.microtask { color: var(--success); }
        .log-type.macrotask { color: var(--warning); }
        .log-type.async { color: var(--accent-cyan); }
        .log-type.error { color: var(--error); }
        .log-type.location { color: var(--accent-purple); }

        .log-message {
            flex: 1;
            color: var(--text-secondary);
        }

        .log-message .highlight {
            color: var(--accent-cyan);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-cyan);
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 40px;
            padding: 24px;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
        }

        footer a {
            color: var(--accent-cyan);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        footer a:hover {
            color: var(--accent-purple);
            text-shadow: var(--glow-cyan);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .container {
                padding: 12px;
            }

            h1 {
                font-size: 1.6rem;
            }

            .search-container {
                flex-direction: column;
            }

            .search-input {
                width: 100%;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            .temperature {
                font-size: 3.5rem;
            }

            .weather-details {
                grid-template-columns: 1fr;
            }

            .city-name {
                font-size: 1.6rem;
            }

            .log-panel {
                font-size: 0.7rem;
            }
        }

        /* Additional Weather Info */
        .extra-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 20px;
        }

        .extra-card {
            background: var(--bg-primary);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .extra-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .extra-value {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* Timestamp */
        .update-time {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-top: 16px;
            font-family: 'Share Tech Mono', monospace;
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="grid-overlay"></div>

    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">⛈️</div>
                <h1>SkyPulse</h1>
            </div>
            <p class="subtitle">Advanced Weather Tracking System</p>
        </header>

        <div class="main-grid">
            <div class="left-column">
                <div class="card">
                    <div class="card-title">Weather Search</div>
                    
                    <button class="btn btn-secondary location-btn" id="locationBtn">
                        📍 Get My Location
                    </button>
                    
                    <div class="search-container">
                        <input type="text" class="search-input" id="cityInput" placeholder="Enter city name...">
                        <button class="btn btn-primary" id="searchBtn">🔍 Search</button>
                    </div>
                    
                    <div class="weather-display" id="weatherDisplay">
                        <div class="empty-state">
                            <div class="empty-icon">🌐</div>
                            <p>Search for a city or use your location</p>
                        </div>
                    </div>
                </div>

                <div class="card history-section">
                    <div class="history-header">
                        <div class="card-title">Recent Searches</div>
                        <button class="clear-btn" id="clearHistoryBtn">Clear</button>
                    </div>
                    <div class="history-list" id="historyList">
                        <div class="empty-state" style="padding: 20px;">
                            <p>No search history</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="right-column">
                <div class="card">
                    <div class="card-title">Execution Log</div>
                    <div class="log-panel" id="logPanel">
                        <div class="log-header">
                            <span class="log-title">Event Loop Monitor</span>
                            <button class="log-clear-btn" id="logClearBtn">Clear</button>
                        </div>
                        <div id="logEntries">
                            <div class="log-entry">
                                <span class="log-time">--:--:--</span>
                                <span class="log-type sync">SYSTEM</span>
                                <span class="log-message">SkyPulse initialized</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>Powered by Advanced Weather API | <a href="https://openweathermap.org/" target="_blank">OpenWeatherMap</a></p>
        </footer>
    </div>

    <script>
        // ============================================
        // SKYPULSE - Advanced Weather Tracker (REPAIRED)
        // ============================================

        // Configuration
        const API_KEY = 'demo';
        const API_BASE_URL = 'https://api.openweathermap.org/data/2.5/weather';
        
        // DOM Elements
        const cityInput = document.getElementById('cityInput');
        const searchBtn = document.getElementById('searchBtn');
        const locationBtn = document.getElementById('locationBtn');
        const weatherDisplay = document.getElementById('weatherDisplay');
        const historyList = document.getElementById('historyList');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        const logEntries = document.getElementById('logEntries');
        const logClearBtn = document.getElementById('logClearBtn');

        // State
        let searchHistory = [];
        let currentWeather = null;

        // ============================================
        // EXECUTION LOGGER - Event Loop Demonstration
        // REPAIRED: Fixed race condition with proper ordering
        // ============================================
        
        const ExecutionLogger = {
            entries: [],
            logSequence: 0,
            
            getTimestamp() {
                const now = new Date();
                return now.toLocaleTimeString('en-US', { 
                    hour12: false, 
                    hour: '2-digit', 
                    minute: '2-digit', 
                    second: '2-digit',
                    fractionalSecondDigits: 3 
                });
            },

            log(type, message) {
                const sequence = ++this.logSequence;
                const entry = {
                    sequence: sequence,
                    time: this.getTimestamp(),
                    type: type,
                    message: message
                };
                
                this.entries.push(entry);
                
                const logEntry = document.createElement('div');
                logEntry.className = 'log-entry';
                logEntry.dataset.sequence = sequence;
                logEntry.innerHTML = `
                    <span class="log-time">${entry.time}</span>
                    <span class="log-type ${type.toLowerCase()}">${type}</span>
                    <span class="log-message">${entry.message}</span>
                `;
                logEntries.appendChild(logEntry);
                
                const logPanel = document.getElementById('logPanel');
                logPanel.scrollTop = logPanel.scrollHeight;

                this.simulateEventLoop(type, sequence);
            },

            // REPAIRED: Fixed to use sequence-based ordering to prevent race conditions
            simulateEventLoop(type, sequence) {
                if (type === 'SYNC') {
                    // Queue microtask - use Promise.resolve().then() for proper microtask behavior
                    Promise.resolve().then(() => {
                        this.log('MICROTASK', `Promise.then() queued in microtask queue [seq:${sequence}]`);
                    });
                    
                    // Queue macrotask - use setTimeout for proper macrotask behavior
                    // REPAIRED: Added small delay to ensure proper ordering
                    setTimeout(() => {
                        this.log('MACROTASK', `setTimeout callback executed (macrotask) [seq:${sequence}]`);
                    }, 10);
                }
            },

            clear() {
                this.entries = [];
                this.logSequence = 0;
                logEntries.innerHTML = `
                    <div class="log-entry">
                        <span class="log-time">${this.getTimestamp()}</span>
                        <span class="log-type sync">SYSTEM</span>
                        <span class="log-message">Log cleared</span>
                    </div>
                `;
            }
        };

        // ============================================
        // LOCAL STORAGE MANAGER
        // ============================================

        const StorageManager = {
            KEY: 'skypulse_history',

            getHistory() {
                try {
                    const data = localStorage.getItem(this.KEY);
                    return data ? JSON.parse(data) : [];
                } catch (error) {
                    ExecutionLogger.log('ERROR', 'LocalStorage read failed');
                    return [];
                }
            },

            saveHistory(history) {
                try {
                    localStorage.setItem(this.KEY, JSON.stringify(history));
                    ExecutionLogger.log('SYNC', 'History persisted to LocalStorage');
                } catch (error) {
                    ExecutionLogger.log('ERROR', 'LocalStorage write failed');
                }
            },

            addToHistory(cityData) {
                const history = this.getHistory();
                const filtered = history.filter(item => 
                    item.city.toLowerCase() !== cityData.city.toLowerCase()
                );
                
                filtered.unshift({
                    city: cityData.city,
                    country: cityData.country,
                    timestamp: new Date().toISOString(),
                    isLocation: cityData.isLocation || false
                });
                
                const trimmed = filtered.slice(0, 10);
                this.saveHistory(trimmed);
                return trimmed;
            },

            clearHistory() {
                localStorage.removeItem(this.KEY);
                ExecutionLogger.log('SYNC', 'History cleared');
            }
        };

        // ============================================
        // GEOLOCATION - Live Location Support
        // REPAIRED: Fixed error handling and added proper rejection
        // ============================================

        const LocationService = {
            getCurrentPosition() {
                return new Promise((resolve, reject) => {
                    ExecutionLogger.log('LOCATION', 'Requesting geolocation access...');
                    
                    // REPAIRED: Check for geolocation support BEFORE attempting to use it
                    if (!navigator.geolocation) {
                        ExecutionLogger.log('ERROR', 'Geolocation not supported by this browser');
                        reject(new Error('Geolocation is not supported by this browser'));
                        return;
                    }

                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            ExecutionLogger.log('LOCATION', `Location obtained: ${position.coords.latitude.toFixed(4)}, ${position.coords.longitude.toFixed(4)}`);
                            resolve({
                                lat: position.coords.latitude,
                                lon: position.coords.longitude
                            });
                        },
                        (error) => {
                            let errorMessage = 'Unknown error';
                            switch(error.code) {
                                case error.PERMISSION_DENIED:
                                    errorMessage = 'Location permission denied';
                                    break;
                                case error.POSITION_UNAVAILABLE:
                                    errorMessage = 'Location information unavailable';
                                    break;
                                case error.TIMEOUT:
                                    errorMessage = 'Location request timed out';
                                    break;
                            }
                            ExecutionLogger.log('ERROR', `Geolocation error: ${errorMessage}`);
                            reject(new Error(errorMessage));
                        },
                        {
                            enableHighAccuracy: true,
                            timeout: 10000,
                            maximumAge: 0
                        }
                    );
                });
            }
        };

        // ============================================
        // WEATHER API - Async Data Fetching
        // ============================================

        const WeatherAPI = {
            // Get weather by coordinates
            getWeatherByCoords(lat, lon) {
                return new Promise((resolve, reject) => {
                    ExecutionLogger.log('ASYNC', `Fetching weather for coordinates: ${lat}, ${lon}`);
                    
                    setTimeout(() => {
                        const conditions = [
                            { main: 'Clear', description: 'clear sky', icon: '☀️', code: 800 },
                            { main: 'Clouds', description: 'scattered clouds', icon: '⛅', code: 802 },
                            { main: 'Rain', description: 'light rain', icon: '🌧️', code: 500 },
                            { main: 'Snow', description: 'light snow', icon: '❄️', code: 600 },
                            { main: 'Thunderstorm', description: 'thunderstorm', icon: '⛈️', code: 200 },
                            { main: 'Mist', description: 'mist', icon: '🌫️', code: 701 }
                        ];
                        
                        const condition = conditions[Math.floor(Math.random() * conditions.length)];
                        const temp = Math.floor(Math.random() * 40) - 5;
                        
                        resolve({
                            name: 'Current Location',
                            country: '📍',
                            coord: { lat, lon },
                            main: {
                                temp: temp,
                                feels_like: temp - Math.floor(Math.random() * 5),
                                humidity: Math.floor(Math.random() * 60) + 30,
                                pressure: Math.floor(Math.random() * 200) + 1000,
                                temp_min: temp - 3,
                                temp_max: temp + 3
                            },
                            weather: [{
                                main: condition.main,
                                description: condition.description,
                                icon: condition.icon,
                                id: condition.code
                            }],
                            wind: {
                                speed: Math.floor(Math.random() * 15) + 2,
                                deg: Math.floor(Math.random() * 360)
                            },
                            visibility: Math.floor(Math.random() * 8000) + 2000,
                            clouds: { all: Math.floor(Math.random() * 100) },
                            dt: Math.floor(Date.now() / 1000),
                            sys: {
                                sunrise: Math.floor(Date.now() / 1000) - 21600,
                                sunset: Math.floor(Date.now() / 1000) + 21600
                            },
                            timezone: Math.floor(Math.random() * 12 - 6) * 3600,
                            isLocation: true
                        });
                    }, 1500);
                });
            },

            // Get weather by city name
            getWeatherByCity(city) {
                return new Promise((resolve, reject) => {
                    ExecutionLogger.log('ASYNC', `Fetching weather for city: <span class="highlight">${city}</span>`);
                    
                    setTimeout(() => {
                        if (city.toLowerCase() === 'error') {
                            reject(new Error('API Error: Invalid response'));
                            return;
                        }
                        
                        if (city.toLowerCase() === 'timeout') {
                            reject(new Error('Request timeout'));
                            return;
                        }

                        const conditions = [
                            { main: 'Clear', description: 'clear sky', icon: '☀️', code: 800 },
                            { main: 'Clouds', description: 'overcast clouds', icon: '☁️', code: 804 },
                            { main: 'Rain', description: 'moderate rain', icon: '🌧️', code: 501 },
                            { main: 'Snow', description: 'snow showers', icon: '🌨️', code: 601 },
                            { main: 'Thunderstorm', description: 'thunderstorm with rain', icon: '⛈️', code: 201 },
                            { main: 'Drizzle', description: 'light drizzle', icon: '🌦️', code: 300 }
                        ];
                        
                        const condition = conditions[Math.floor(Math.random() * conditions.length)];
                        const temp = Math.floor(Math.random() * 45) - 10;
                        
                        resolve({
                            name: city.charAt(0).toUpperCase() + city.slice(1),
                            country: ['US', 'UK', 'DE', 'FR', 'JP', 'AU'][Math.floor(Math.random() * 6)],
                            main: {
                                temp: temp,
                                feels_like: temp - Math.floor(Math.random() * 6),
                                humidity: Math.floor(Math.random() * 70) + 20,
                                pressure: Math.floor(Math.random() * 200) + 990,
                                temp_min: temp - 4,
                                temp_max: temp + 4
                            },
                            weather: [{
                                main: condition.main,
                                description: condition.description,
                                icon: condition.icon,
                                id: condition.code
                            }],
                            wind: {
                                speed: Math.floor(Math.random() * 20) + 1,
                                deg: Math.floor(Math.random() * 360)
                            },
                            visibility: Math.floor(Math.random() * 9000) + 1000,
                            clouds: { all: Math.floor(Math.random() * 100) },
                            dt: Math.floor(Date.now() / 1000),
                            sys: {
                                sunrise: Math.floor(Date.now() / 1000) - 21600,
                                sunset: Math.floor(Date.now() / 1000) + 21600
                            },
                            timezone: Math.floor(Math.random() * 12 - 6) * 3600,
                            isLocation: false
                        });
                    }, 1500);
                });
            },

            // Fetch weather - main method
            async fetchWeather(city = null, coords = null) {
                ExecutionLogger.log('SYNC', 'fetchWeather function called');
                
                try {
                    let data;
                    if (coords) {
                        data = await this.getWeatherByCoords(coords.lat, coords.lon);
                    } else if (city) {
                        data = await this.getWeatherByCity(city);
                    } else {
                        throw new Error('Please provide city name or use location');
                    }
                    
                    ExecutionLogger.log('MICROTASK', 'Weather data promise resolved');
                    return data;
                } catch (error) {
                    ExecutionLogger.log('ERROR', `Fetch failed: ${error.message}`);
                    throw error;
                }
            }
        };

        // ============================================
        // UI RENDERER
        // ============================================

        const UIRenderer = {
            showLoading() {
                weatherDisplay.innerHTML = `
                    <div class="loading-container">
                        <div class="spinner"></div>
                        <div class="loading-text">Fetching weather data...</div>
                    </div>
                `;
            },

            showError(message, hint = '') {
                weatherDisplay.innerHTML = `
                    <div class="error-container">
                        <div class="error-icon">⚠️</div>
                        <div class="error-message">${message}</div>
                        ${hint ? `<div class="error-hint">${hint}</div>` : ''}
                    </div>
                `;
            },

            showWeather(data) {
                currentWeather = data;
                const { name, country, main, weather, wind, visibility, clouds, dt, sys, isLocation } = data;
                
                const updateTime = new Date(dt * 1000).toLocaleTimeString();
                const sunrise = new Date(sys.sunrise * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const sunset = new Date(sys.sunset * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                weatherDisplay.innerHTML = `
                    <div class="weather-content">
                        <div class="city-header">
                            <h2 class="city-name">${name}</h2>
                            ${isLocation ? '<span class="location-badge">LIVE</span>' : ''}
                        </div>
                        <p class="country">${country} ${isLocation ? 'Location' : ''}</p>
                        
                        <div class="temperature-container">
                            <span class="temperature">${Math.round(main.temp)}</span>
                            <span class="temperature-unit">°C</span>
                        </div>
                        
                        <div class="weather-condition">
                            <span class="weather-icon">${weather[0].icon}</span>
                            <span>${weather[0].description}</span>
                        </div>
                        
                        <div class="weather-details">
                            <div class="detail-card">
                                <div class="detail-icon">🌡️</div>
                                <div class="detail-label">Feels Like</div>
                                <div class="detail-value">${Math.round(main.feels_like)}°C</div>
                            </div>
                            <div class="detail-card">
                                <div class="detail-icon">💧</div>
                                <div class="detail-label">Humidity</div>
                                <div class="detail-value">${main.humidity}%</div>
                            </div>
                            <div class="detail-card">
                                <div class="detail-icon">💨</div>
                                <div class="detail-label">Wind</div>
                                <div class="detail-value">${wind.speed} m/s</div>
                            </div>
                        </div>
                        
                        <div class="extra-details">
                            <div class="extra-card">
                                <div class="extra-label">Visibility</div>
                                <div class="extra-value">${(visibility / 1000).toFixed(1)} km</div>
                            </div>
                            <div class="extra-card">
                                <div class="extra-label">Cloudiness</div>
                                <div class="extra-value">${clouds.all}%</div>
                            </div>
                            <div class="extra-card">
                                <div class="extra-label">Sunrise</div>
                                <div class="extra-value">${sunrise}</div>
                            </div>
                            <div class="extra-card">
                                <div class="extra-label">Sunset</div>
                                <div class="extra-value">${sunset}</div>
                            </div>
                        </div>
                        
                        <div class="update-time">Last updated: ${updateTime}</div>
                    </div>
                `;
            },

            showEmpty() {
                weatherDisplay.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🌐</div>
                        <p>Search for a city or use your location</p>
                    </div>
                `;
            },

            renderHistory(history) {
                if (history.length === 0) {
                    historyList.innerHTML = `
                        <div class="empty-state" style="padding: 20px;">
                            <p>No search history</p>
                        </div>
                    `;
                    return;
                }

                historyList.innerHTML = history.map((item) => {
                    const date = new Date(item.timestamp);
                    const timeStr = date.toLocaleTimeString('en-US', { 
                        hour: '2-digit', 
                        minute: '2-digit' 
                    });
                    
                    return `
                        <div class="history-item" data-city="${item.city}" data-is-location="${item.isLocation}">
                            <span class="history-city">${item.isLocation ? '📍 Current Location' : item.city}</span>
                            <span class="history-time">${timeStr}</span>
                        </div>
                    `;
                }).join('');

                document.querySelectorAll('.history-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const isLocation = item.dataset.isLocation === 'true';
                        if (isLocation) {
                            handleLocationSearch();
                        } else {
                            const city = item.dataset.city;
                            cityInput.value = city;
                            handleSearch(city);
                        }
                    });
                });
            }
        };

        // ============================================
        // EVENT HANDLERS
        // REPAIRED: Added input clearing and improved error handling
        // ============================================

        async function handleSearch(city = null) {
            const searchCity = city || cityInput.value.trim();
            
            // REPAIRED: Better validation - check if input is empty after trimming
            if (!searchCity || searchCity.length === 0) {
                UIRenderer.showError('Please enter a city name', 'City name cannot be empty');
                ExecutionLogger.log('ERROR', 'Empty search input');
                return;
            }

            searchBtn.disabled = true;
            searchBtn.textContent = '⏳ Searching...';
            
            ExecutionLogger.log('SYNC', `Search initiated: <span class="highlight">${searchCity}</span>`);
            
            try {
                UIRenderer.showLoading();
                const weatherData = await WeatherAPI.fetchWeather(searchCity);
                
                UIRenderer.showWeather(weatherData);
                
                // REPAIRED: Clear input after successful search
                cityInput.value = '';
                
                searchHistory = StorageManager.addToHistory({
                    city: weatherData.name,
                    country: weatherData.country,
                    isLocation: false
                });
                
                UIRenderer.renderHistory(searchHistory);
                ExecutionLogger.log('MICROTASK', 'UI updated with weather data');
                
            } catch (error) {
                UIRenderer.showError(error.message, 'Try a different city name');
                ExecutionLogger.log('ERROR', `Search failed: ${error.message}`);
            } finally {
                searchBtn.disabled = false;
                searchBtn.textContent = '🔍 Search';
            }
        }

        async function handleLocationSearch() {
            locationBtn.disabled = true;
            locationBtn.textContent = '⏳ Getting location...';
            
            ExecutionLogger.log('SYNC', 'Location search initiated');
            
            try {
                UIRenderer.showLoading();
                
                const coords = await LocationService.getCurrentPosition();
                const weatherData = await WeatherAPI.fetchWeather(null, coords);
                
                UIRenderer.showWeather(weatherData);
                
                searchHistory = StorageManager.addToHistory({
                    city: 'Current Location',
                    country: '📍',
                    isLocation: true
                });
                
                UIRenderer.renderHistory(searchHistory);
                ExecutionLogger.log('LOCATION', 'Weather data received for current location');
                
            } catch (error) {
                // REPAIRED: Properly handle and display location errors
                UIRenderer.showError(
                    error.message || 'Failed to get location',
                    error.message.includes('permission') ? 'Please enable location access in your browser settings' : 
                    error.message.includes('not supported') ? 'Your browser does not support geolocation' :
                    'Please try again or search by city name'
                );
                ExecutionLogger.log('ERROR', `Location failed: ${error.message}`);
            } finally {
                locationBtn.disabled = false;
                locationBtn.textContent = '📍 Get My Location';
            }
        }

        function handleClearHistory() {
            StorageManager.clearHistory();
            searchHistory = [];
            UIRenderer.renderHistory(searchHistory);
            UIRenderer.showEmpty();
        }

        function handleClearLog() {
            ExecutionLogger.clear();
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================

        searchBtn.addEventListener('click', () => handleSearch());

        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSearch();
        });

        locationBtn.addEventListener('click', handleLocationSearch);

        clearHistoryBtn.addEventListener('click', handleClearHistory);

        logClearBtn.addEventListener('click', handleClearLog);

        // ============================================
        // INITIALIZATION
        // ============================================

        function init() {
            ExecutionLogger.log('SYNC', 'SkyPulse weather system initializing...');
            
            searchHistory = StorageManager.getHistory();
            UIRenderer.renderHistory(searchHistory);
            
            ExecutionLogger.log('SYNC', 'System ready');
            ExecutionLogger.log('MICROTASK', 'Awaiting user input');
            
            setTimeout(() => {
                ExecutionLogger.log('MACROTASK', 'Initial demo complete');
            }, 100);
        }

        init();
    </script>
</body>
</html>
